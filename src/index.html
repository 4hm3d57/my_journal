<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>home</title>
</head>
<body>
    <section class="home-navbar">
        <div class="home-logo">LOGO</div>
        <div class="home-navlinks">
            <ul>
                <li><a href="login.html"><u>login</u></a></li>
                <li><a href="signup.html"><u>signup</u></a></li>
            </ul>
        </div>
    </section>

    <section class="latest-entries">
        <h2>Latest Journal Entries</h2>
        <ul>
            <% latestEntries.forEach(entry => { %>
                <li>
                    <h3><%= entry.title %></h3>
                    <p><%= entry.content %></p>
                    <p class="entry-date"><%= new Date(entry.date).toLocaleString() %></p>
                </li>
            <% }); %>
        </ul>
    </section>


</body>
</html>
