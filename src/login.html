<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>login</title>
</head>
<body>
    <section class="login-navbar">
        <div class="login-logo">LOGO</div>
        <div class="login-navlinks">
            <ul>
                <li><a href="index.html"><u>home</u></a></li>
                <li><a href="signup.html"><u>signup</u></a></li>
            </ul>
        </div>
    </section>

    <!--center layout for the login info page-->
    <section class="login-container">
        <form class="login-centered-layout" action="/login" method="POST">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br>

            
            <input type="submit" value="login">
        </form>
    </section>

</body>
</html>
